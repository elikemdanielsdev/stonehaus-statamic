title: 'SEO Settings'
fields:
  -
    handle: meta_title
    field:
      type: text
      display: 'Meta Title'
  -
    handle: meta_description
    field:
      type: textarea
      display: 'Meta Description'
  -
    handle: meta_image
    field:
      container: assets
      type: assets
      display: 'Meta Image'
      max_files: 1
      mode: grid
  -
    handle: meta_keywords
    field:
      type: list
      display: 'Meta Keywords'
